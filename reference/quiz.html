<!DOCTYPE html>
<!--
  Learn BMAD — Scenario Gut-Check. Static, self-contained (inline CSS + JS, no external
  deps). Open in a browser; no AI required. It's a LIGHT, no-stakes self-check: pick a
  gut answer, then reveal the BMAD reasoning. The reveal is the point, not the score.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Learn BMAD — Scenario Gut-Check</title>
  <style>
    :root { --ink:#1a1a2e; --muted:#555; --line:#d8d8e0; --accent:#6d28d9; --accent2:#059669; --bg:#f4f4f8; --card:#fff; }
    * { box-sizing:border-box; }
    body { margin:0; padding:2rem 1rem; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--ink); background:var(--bg); line-height:1.55; }
    .wrap { max-width:760px; margin:0 auto; }
    header { border-bottom:3px solid var(--accent); padding-bottom:.75rem; margin-bottom:1.5rem; }
    header h1 { margin:0 0 .25rem; font-size:1.6rem; }
    header p { margin:0; color:var(--muted); font-size:.95rem; }
    .q { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:1.1rem 1.2rem; margin-bottom:1.1rem; }
    .q .scenario { font-weight:600; margin:0 0 .8rem; }
    .opt { display:block; width:100%; text-align:left; background:#faf9ff; border:1px solid var(--line); border-radius:8px; padding:.6rem .8rem; margin:.4rem 0; font-size:.95rem; cursor:pointer; transition:background .12s,border-color .12s; }
    .opt:hover { border-color:var(--accent); }
    .opt.picked { border-color:var(--accent); background:#efe9ff; }
    .reveal { display:none; margin-top:.8rem; padding:.8rem 1rem; background:#ecfdf5; border:1px solid #a7f3d0; border-radius:8px; font-size:.93rem; }
    .reveal.show { display:block; }
    .reveal .lead { font-weight:700; color:var(--accent2); }
    .revealbtn { margin-top:.6rem; background:var(--accent); color:#fff; border:none; border-radius:8px; padding:.5rem .9rem; font-size:.9rem; cursor:pointer; }
    .revealbtn:hover { background:#5b21b6; }
    footer { margin-top:1.5rem; padding-top:.75rem; border-top:1px solid var(--line); font-size:.8rem; color:var(--muted); }
    .tag { display:inline-block; font-size:.72rem; font-weight:600; color:var(--accent); background:#efe9ff; border-radius:999px; padding:.1rem .55rem; margin-bottom:.5rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Scenario Gut-Check</h1>
      <p>No stakes, no score. Pick your gut answer, then hit <em>Reveal</em>. The reasoning is the prize — if your gut differs, that's the interesting bit.</p>
    </header>
    <div id="quiz"></div>
    <footer>Learn BMAD · A light self-check, not an exam. Want the real thing? Open the course in Claude Code and say "Quiz me." · No model required.</footer>
  </div>

  <script>
    const QUESTIONS = [
      {
        tag: "Module 1 · Why BMAD",
        scenario: "Someone one-chats \"build me a booking app.\" Halfway through, the AI has built two different calendars that don't sync. Which belief would've prevented it?",
        options: ["Plan before you build", "Make decisions explicit", "Use specialists, not one generalist", "All of the above help — but one is the direct fix"],
        reveal: "Direct fix: <b>make decisions explicit</b> (#2). One written \"this is THE calendar\" decision means every part builds against it. Using an <b>architect</b> (#4) and a little <b>planning</b> (#1) would've surfaced it too — so \"all of the above\" is a fair gut answer. The lesson: nail down the shared decision in writing."
      },
      {
        tag: "Module 2 · The Map",
        scenario: "You're handed a document titled \"architecture.md\" full of technical decisions and trade-offs. Which phase produced it?",
        options: ["Analysis", "Planning", "Solutioning", "Implementation"],
        reveal: "<b>Solutioning</b> (Phase 3). Planning answers <i>what &amp; why</i> (the PRD); Solutioning answers <i>how</i> and produces architecture + ADRs, then breaks work into epics &amp; stories. Implementation is where you actually build."
      },
      {
        tag: "Module 7 · Right-Size It",
        scenario: "A teammate wants to run the full four-phase method — PRD, architecture, the works — to fix a typo in a footer. Your take?",
        options: ["Yes! Rigor is always good.", "No — that's over-processing; reach for quick-dev", "Skip BMAD entirely and never plan anything", "Do a PRD just for safety"],
        reveal: "<b>Quick-dev.</b> Scale rigor to the change (belief #3). A typo is a one-shot, zero-blast-radius change — clarify, do it, glance at the result. Over-processing tiny work is its own mistake. Save the four phases for the big stuff."
      },
      {
        tag: "Module 3 · Your Crew",
        scenario: "Your last sprint was a disaster and you want to figure out what went wrong, with a few perspectives arguing it out. What do you reach for?",
        options: ["Just ask the Developer agent", "Party Mode", "Write a PRD", "The readiness gate"],
        reveal: "<b>Party Mode</b> — the whole crew in one chat, responding in character, agreeing and disagreeing. The docs literally list post-mortems and retrospectives as a sweet spot for it."
      },
      {
        tag: "Module 6 · Ship It",
        scenario: "You've got a planned feature with five stories. How does BMAD build them?",
        options: ["All five in one big chat to keep context together", "One story at a time, each in a fresh chat", "Skip stories; just build the whole feature", "Only after writing all the code first"],
        reveal: "<b>One story at a time, each in a fresh chat.</b> Fresh chats keep context clean and stop stale assumptions leaking between steps. The cycle per story: create-story → dev-story → code-review, then a retrospective per epic."
      },
      {
        tag: "Module 8 · Never Get Lost",
        scenario: "You're three steps into a project and genuinely don't know what to do next. First move?",
        options: ["Guess and hope", "Run BMad-Help", "Start over from scratch", "Read the entire codebase"],
        reveal: "<b>Run BMad-Help.</b> It inspects your project, shows your options, and recommends the next required task. It even runs automatically at the end of every workflow. Still stuck on specifics? Check the docs — never guess."
      }
    ];

    const root = document.getElementById('quiz');
    QUESTIONS.forEach((q, qi) => {
      const card = document.createElement('div');
      card.className = 'q';
      card.innerHTML = '<div class="tag">' + q.tag + '</div><p class="scenario">' + q.scenario + '</p>';
      q.options.forEach((opt, oi) => {
        const b = document.createElement('button');
        b.className = 'opt';
        b.textContent = opt;
        b.onclick = () => {
          card.querySelectorAll('.opt').forEach(o => o.classList.remove('picked'));
          b.classList.add('picked');
        };
        card.appendChild(b);
      });
      const rb = document.createElement('button');
      rb.className = 'revealbtn';
      rb.textContent = 'Reveal the reasoning';
      const rv = document.createElement('div');
      rv.className = 'reveal';
      rv.innerHTML = '<span class="lead">The BMAD take:</span> ' + q.reveal;
      rb.onclick = () => rv.classList.add('show');
      card.appendChild(rb);
      card.appendChild(rv);
      root.appendChild(card);
    });
  </script>
</body>
</html>
